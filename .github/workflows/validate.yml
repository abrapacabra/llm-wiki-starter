name: Validate repository

"on":
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync Python environment
        run: uv sync --locked

      - name: Run wiki validator
        run: uv run python tools/validate_repo.py

      - name: Run unit tests
        run: uv run python -m unittest discover -s tests -v

      - name: Run advisory health report
        run: uv run python tools/validate_repo.py --health-report
