name: Validate repository

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run wiki validator
        run: python tools/validate_repo.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Run advisory health report
        run: python tools/validate_repo.py --health-report
